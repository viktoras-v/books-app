name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build backend image
      uses: docker/build-push-action@v3
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/books-app:backend-${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/books-app:backend-latest

    - name: Build frontend image
      uses: docker/build-push-action@v3
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/books-app:frontend-${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/books-app:frontend-latest